# Cargo deny configuration for Brainflow2
# This configuration enforces security and licensing policies for dependencies

[graph]
# If true, metadata will be collected with `--all-features`
all-features = false
# If true, metadata will be collected with `--no-default-features`
no-default-features = false
# The path where the generated graph will be saved
# Defaults to `<target_directory>/deny.dot`
targets = [
    { triple = "x86_64-unknown-linux-gnu" },
    { triple = "x86_64-pc-windows-msvc" },
    { triple = "x86_64-apple-darwin" },
    { triple = "aarch64-apple-darwin" },
]

[output]
# When outputting inclusion graphs in diagnostics that include features, this
# option can be used to specify the depth at which feature edges will be added.
# This option is included since the graphs can be quite large and the addition
# of features from the crate(s) to all of the graph roots can be far too verbose.
# This option can be overridden via `--feature-depth` on the cmd line
feature-depth = 1

[advisories]
# The path where the advisory database is cloned/fetched into
db-path = "~/.cargo/advisory-db"
# The url(s) of the advisory databases to use
db-urls = ["https://github.com/rustsec/advisory-db"]
# The lint level for security vulnerabilities
vulnerability = "deny"
# The lint level for unmaintained crates
unmaintained = "warn"
# The lint level for crates that have been yanked from their source registry
yanked = "warn"
# The lint level for crates with security notices. Note that as of
# 2019-12-17 there are no security notice advisories in
# https://github.com/rustsec/advisory-db
notice = "warn"
# A list of advisory IDs to ignore. Note that ignored advisories will still
# output a note when they are encountered.
ignore = [
    # Ignore specific advisories if needed
    # "RUSTSEC-0000-0000",
]
# Threshold for security vulnerabilities, any vulnerability with a CVSS score
# lower than this value will be ignored. Note that ignored advisories will still
# output a note when they are encountered.
# * None - CVSS Score 0.0
# * Low - CVSS Score 0.1 - 3.9
# * Medium - CVSS Score 4.0 - 6.9
# * High - CVSS Score 7.0 - 8.9
# * Critical - CVSS Score 9.0 - 10.0
severity-threshold = "low"

[licenses]
# The confidence threshold for detecting a license from a license text.
# The higher the value, the more closely the license text must match the
# canonical license text of a valid SPDX license file.
# Minimum 0.0, maximum 1.0
confidence-threshold = 0.8
# List of explicitly allowed licenses
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "CC0-1.0",
    "MPL-2.0",
    "Zlib",
    "Unlicense",
]
# List of explicitly disallowed licenses
deny = [
    "GPL-2.0",
    "GPL-3.0",
    "AGPL-1.0",
    "AGPL-3.0",
    "LGPL-2.0",
    "LGPL-2.1",
    "LGPL-3.0",
    "EUPL-1.0",
    "EUPL-1.1",
    "EUPL-1.2",
    "CECILL-2.0",
    "CECILL-2.1",
    "CECILL-B",
    "CECILL-C",
]
# Lint level for when multiple versions of the same project are detected
copyleft = "warn"
# Confidence threshold for detecting a license from a license text.
# The higher the value, the more closely the license text must match the
# canonical license text of a valid SPDX license file.
# The above confidence-threshold takes precedence over this.
default = "deny"
# The confidence threshold for detecting a license from a license text.
# If the license text is not recognized with the above confidence level,
# this one will be used instead.
threshold = 0.8
# List of crates to explicitly allow regardless of license
exceptions = [
    # Allow specific crates with unclear licensing if needed
    # { allow = ["example-crate"], name = "example" },
]

[[licenses.clarify]]
# The name of the crate the clarification applies to
name = "ring"
# The optional version constraint for the crate
version = "*"
# The SPDX expression for the license requirements of the crate
expression = "MIT AND ISC AND OpenSSL"
# One or more files in the crate's source used as the "source of truth" for
# the license expression. If the files are missing, or do not contain the
# specified license text, the clarification will fail
license-files = [
    { path = "LICENSE", hash = 0xbd0eed23 }
]

[bans]
# Lint level for when multiple versions of the same crate are detected
multiple-versions = "warn"
# Lint level for when a crate version requirement is `*`
wildcards = "allow"
# The graph highlighting used when creating dotgraphs for crates
# with multiple versions
highlight = "all"
# The default lint level for `default` features for crates that are members
# of the workspace that is being checked. This can be overridden by allowing
# or denying specific crates below.
workspace-default-features = "allow"
# The default lint level for `default` features for external crates that are
# not workspace members. This can be overridden by allowing or denying specific
# crates below.
external-default-features = "allow"
# List of crates that are allowed. Use with care!
allow = [
    # Allow specific crates if needed
    # { name = "example-crate", version = "=1.0.0" },
]
# List of crates to deny
deny = [
    # Deny known problematic crates
    { name = "openssl", wrappers = ["openssl-sys"] },
    { name = "proc-macro-error" }, # Known to have issues
    { name = "stdweb" }, # Deprecated in favor of web-sys
    { name = "failure" }, # Deprecated in favor of thiserror/anyhow
]
# Certain crates/versions that will be skipped when doing duplicate detection.
skip = [
    # Skip version conflicts for these crates
    # { name = "example-crate", version = "=0.1.0" },
]
# Similarly to `skip` allows you to skip certain crates from being checked that they
# are on the latest version.
skip-tree = [
    # Skip entire dependency trees
    # { name = "example-crate", version = "=0.1.0" },
]

[sources]
# Lint level for what to happen when a crate from a crate registry that is
# not in the allow list is encountered
unknown-registry = "warn"
# Lint level for what to happen when a crate from a git repository that is not
# in the allow list is encountered
unknown-git = "warn"
# Lint level for what to happen when a crate from a local path that is not in
# the allow list is encountered
local = "allow"

[sources.allow-registry]
# List of URLs for allowed registries. Defaults to the crates.io index
# if not specified. If it is specified but empty, no registries are allowed.
"https://github.com/rust-lang/crates.io-index" = true

[sources.allow-git]
# List of URLs for allowed Git repositories
"https://github.com/tauri-apps/tauri" = true
"https://github.com/gfx-rs/wgpu" = true
"https://github.com/dimforge/nalgebra" = true
# Allow local neuroatlas development
"https://github.com/bbuchsbaum/neuroatlas-rs" = true