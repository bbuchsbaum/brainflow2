name: CPU/GPU Differential Testing

on:
  push:
    branches: [ main ]
    paths:
      - 'core/neuro-types/**'
      - 'core/neuro-cpu/**'
      - 'core/render_loop/**'
      - 'core/volmath/**'
      - 'core/neuro-integration-tests/**'
      - '.github/workflows/differential-testing.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'core/neuro-types/**'
      - 'core/neuro-cpu/**'
      - 'core/render_loop/**'
      - 'core/volmath/**'
      - 'core/neuro-integration-tests/**'
      - '.github/workflows/differential-testing.yml'
  schedule:
    # Run nightly to catch any regressions
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      test_filter:
        description: 'Test filter pattern (e.g. "axial" to run only axial tests)'
        required: false
        default: ''

env:
  RUST_BACKTRACE: 1
  CARGO_INCREMENTAL: 0 # Disable incremental compilation for more consistent results

jobs:
  differential-tests:
    name: CPU/GPU Differential Tests
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        include:
          - os: ubuntu-latest
            gpu_available: true
          - os: windows-latest
            gpu_available: true
          - os: macos-latest
            gpu_available: true # Metal support

    steps:
    - uses: actions/checkout@v4

    - name: Setup Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        components: clippy

    - name: Cache Rust dependencies
      uses: Swatinem/rust-cache@v2
      with:
        workspaces: ". -> target"

    # Linux-specific GPU setup
    - name: Setup GPU environment (Linux)
      if: matrix.os == 'ubuntu-latest'
      run: |
        # Install Mesa drivers for software rendering fallback
        sudo apt-get update
        sudo apt-get install -y mesa-utils libgl1-mesa-dri
        # Set environment for software rendering
        echo "LIBGL_ALWAYS_SOFTWARE=1" >> $GITHUB_ENV
        echo "GALLIUM_DRIVER=llvmpipe" >> $GITHUB_ENV

    # Windows-specific GPU setup
    - name: Setup GPU environment (Windows)
      if: matrix.os == 'windows-latest'
      shell: bash
      run: |
        # Windows GPU setup would go here
        echo "Windows GPU environment ready"

    # macOS-specific GPU setup
    - name: Setup GPU environment (macOS)
      if: matrix.os == 'macos-latest'
      run: |
        # macOS uses Metal by default
        echo "macOS Metal environment ready"

    - name: Build neuro crates
      run: |
        cargo build --package neuro-types --release
        cargo build --package neuro-cpu --release
        cargo build --package neuro-integration-tests --release

    - name: Run unit tests
      run: |
        cargo test --package neuro-types --release
        cargo test --package neuro-cpu --release

    - name: Run differential tests
      run: |
        if [ -n "${{ github.event.inputs.test_filter }}" ]; then
          cargo test --package neuro-integration-tests --release -- "${{ github.event.inputs.test_filter }}"
        else
          cargo test --package neuro-integration-tests --release
        fi
      shell: bash

    - name: Run differential benchmarks
      if: matrix.os == 'ubuntu-latest' # Run benchmarks only on Linux
      run: |
        cargo bench --package neuro-integration-tests --bench performance_comparison -- --save-baseline ci-${{ github.sha }}

    - name: Upload benchmark results
      if: matrix.os == 'ubuntu-latest'
      uses: actions/upload-artifact@v4
      with:
        name: benchmark-results-${{ github.sha }}
        path: target/criterion/**/*.json

    - name: Generate differential test report
      if: always()
      run: |
        cargo test --package neuro-integration-tests --release -- --nocapture --test-threads=1 > test_report.txt 2>&1 || true
        echo "::group::Test Report"
        cat test_report.txt
        echo "::endgroup::"

    - name: Upload test report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-report-${{ matrix.os }}-${{ github.sha }}
        path: test_report.txt

  performance-regression-check:
    name: Performance Regression Check
    runs-on: ubuntu-latest
    needs: differential-tests
    if: github.event_name == 'pull_request'

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0 # Need full history for baseline comparison

    - name: Setup Rust
      uses: dtolnay/rust-toolchain@stable

    - name: Cache Rust dependencies
      uses: Swatinem/rust-cache@v2

    - name: Download current benchmark results
      uses: actions/download-artifact@v4
      with:
        name: benchmark-results-${{ github.sha }}
        path: current-benchmarks

    - name: Checkout base branch
      run: |
        git checkout ${{ github.base_ref }}

    - name: Run baseline benchmarks
      run: |
        cargo bench --package neuro-integration-tests --bench performance_comparison -- --save-baseline baseline

    - name: Compare benchmarks
      run: |
        # Install critcmp for benchmark comparison
        cargo install critcmp
        
        # Compare current vs baseline
        critcmp baseline ci-${{ github.sha }} > comparison.txt
        
        echo "::group::Benchmark Comparison"
        cat comparison.txt
        echo "::endgroup::"
        
        # Check for significant regressions (>10% slower)
        if grep -E "^\+[0-9]{2,}\.[0-9]+%" comparison.txt; then
          echo "::error::Performance regression detected (>10% slower)"
          exit 1
        fi

    - name: Comment PR with benchmark results
      if: always()
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');
          const comparison = fs.readFileSync('comparison.txt', 'utf8');
          
          const body = `## Performance Benchmark Results
          
          <details>
          <summary>Benchmark Comparison</summary>
          
          \`\`\`
          ${comparison}
          \`\`\`
          
          </details>
          
          > **Note**: A difference of ±5% is considered normal variance.`;
          
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: body
          });

  summary:
    name: Differential Testing Summary
    runs-on: ubuntu-latest
    needs: [differential-tests, performance-regression-check]
    if: always()

    steps:
    - name: Check job results
      run: |
        if [ "${{ needs.differential-tests.result }}" != "success" ]; then
          echo "::error::Differential tests failed"
          exit 1
        fi
        
        if [ "${{ needs.performance-regression-check.result }}" == "failure" ]; then
          echo "::error::Performance regression detected"
          exit 1
        fi
        
        echo "All differential tests passed successfully!"